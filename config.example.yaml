server:
  host: "0.0.0.0"
  port: 9876

audio:
  enabled: true
  pack_dir: "sounds"        # relative to CWD or absolute
  active_pack: "peon"
  client_packs: {}           # per-client IP overrides, e.g. {"192.168.1.50": "zerg"}
  volume: 0.7               # 0.0–1.0
  mute: false
  disabled_categories: []   # e.g. ["task.progress"]
  debounce_ms: 500          # minimum ms between sounds in same category

registry:
  urls:
    - "https://peonping.github.io/registry/index.json"
  cache_ttl_seconds: 300        # how long to cache the registry index
  download_timeout_seconds: 120 # timeout for downloading pack tarballs

log:
  enabled: true
  level: "INFO"

notification:
  enabled: true
  disabled_categories: []   # e.g. ["task.progress", "task.acknowledge"]
  desktop:
    enabled: true
