server:
  host: "0.0.0.0"
  port: 9876

audio:
  enabled: true
  pack_dir: "sounds"        # relative to CWD or absolute
  active_pack: "peon"
  volume: 0.7               # 0.0–1.0
  mute: false
  disabled_categories: []   # e.g. ["task.progress"]
  debounce_ms: 500          # minimum ms between sounds in same category

log:
  enabled: true
  level: "INFO"
